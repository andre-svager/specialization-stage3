apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Enable application.instanceLabelKey in all namespaces
  application.instanceLabelKey: argocd.argoproj.io/instance

  # Repositórios
  repositories: |
    - type: git
      url: https://github.com/seu-usuario/seu-gitops-repo.git
      name: gitops-repo
      password: ''
      username: ''

  # Integração webhook
  url: https://argocd.seu-dominio.com
  
  # Configurações de sincronização
  application.resourceTrackingMethod: annotation
  
  # Timeout para sincronização
  timeout.reconciliation: 180s
  
  # Notificações de healthcheck
  server.repo.server.plaintext: 'false'
  server.repo.server.strict.tls: 'true'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-ssh-known-hosts-cm
