apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-admin
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: argocd-admin
    namespace: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-applications
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-applications
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-applications
subjects:
  - kind: ServiceAccount
    name: argocd-applications
    namespace: argocd
---
# Política RBAC para diferentes roles
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    # Admin role
    g, admin, role:admin
    
    # Developer role
    g, developers, role:developer
    p, role:developer, applications, create, */*, allow
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, update, */*, allow
    p, role:developer, applications, delete, */*, allow
    p, role:developer, applications, sync, */*, allow
    
    # ReadOnly role
    p, role:readonly, applications, get, */*, allow
    p, role:readonly, applications, list, */*, allow
    p, role:readonly, repositories, get, */*, allow
    p, role:readonly, repositories, list, */*, allow
