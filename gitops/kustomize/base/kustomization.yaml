apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

# Configurações gerais da base
commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: fiap-platform

resources:
  - https://github.com/seu-usuario/seu-gitops-repo/gitops/helm/analytics-service?ref=main
  - https://github.com/seu-usuario/seu-gitops-repo/gitops/helm/auth-service?ref=main
  - https://github.com/seu-usuario/seu-gitops-repo/gitops/helm/evaluation-service?ref=main
  - https://github.com/seu-usuario/seu-gitops-repo/gitops/helm/flag-service?ref=main
  - https://github.com/seu-usuario/seu-gitops-repo/gitops/helm/target-service?ref=main

# Configurações comuns
configMapGenerator:
  - name: app-config
    literals:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=base

secretGenerator:
  - name: app-secrets
    literals:
      - DATABASE_PASSWORD=change-me

# Patches genéricos
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: "*"
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
