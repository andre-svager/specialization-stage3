apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

namePrefix: staging-

bases:
  - ../base

commonLabels:
  environment: staging
  tier: staging

commonAnnotations:
  kustomize.config.k8s.io/environment: staging

# Staging-specific configuration
configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=staging

replicas:
  - name: "*"
    count: 2

# Patches específicas para staging
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "125m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 3
